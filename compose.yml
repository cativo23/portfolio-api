
services:
  api:
    image: portfolio-api:dev-latest
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - .:/home/node/app
    environment:
      - NODE_ENV=development
    user: 'node'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - portfolio
  
  mysql:
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: portfolio
      MYSQL_USER: cativo23
      MYSQL_PASSWORD: password
    volumes:
      - 'mysql-data:/var/lib/mysql'
    networks:
      - portfolio

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - 'redis-data:/data'
    networks:
      - portfolio
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  portfolio:
    driver: bridge
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local