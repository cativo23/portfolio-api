permissions:
  contents: write

name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Cache Yarn dependencies
        uses: actions/cache@v5
        with:
          path: |
            **/node_modules
            .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check formatting
        run: yarn format:check

      - name: Run linter
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Run tests and coverage
        env:
          NODE_ENV: test
          API_KEY_SECRET: ci-test-api-key-secret
          JWT_SECRET: test-jwt-secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: portfolio_test
        run: yarn test:cov

      - name: Generate coverage badge (develop only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: yarn cov:badge

      # Auto-format and push only on develop (not on PRs)
      - name: Apply formatting, update badge, and push (develop only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          yarn format
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}"
          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "chore: apply code formatting and update coverage badge [ci skip]"
            git push
          fi
