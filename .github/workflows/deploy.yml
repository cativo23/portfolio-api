name: Deploy

# This workflow deploys to production when:
# A GitHub Release is published (created via GitHub UI or gh cli)
# This ensures deployment only happens after code is merged to main and properly tagged
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/portfolio-api
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/prod/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/portfolio-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/portfolio-api:buildcache,mode=max

  deploy:
    name: Deploy to Home Server
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Copy compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: 186.32.90.71
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 52222
          source: "compose.prod.yml"
          target: "/home/cativo23/deploy/portfolio-api-deploy"
          debug: true
          timeout: 10m
          command_timeout: 10m
          proxy_timeout: 10m
          tar_exec: tar
          tar_dereference: true
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 186.32.90.71
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 52222
          envs: DOCKER_USERNAME,DB_USERNAME,DB_PASSWORD,DB_NAME,MYSQL_ROOT_PASSWORD,JWT_SECRET,JWT_EXPIRES_IN,CORS_ORIGINS,API_KEY_SECRET,REDIS_PASSWORD,REDIS_TTL,THROTTLE_TTL,THROTTLE_LIMIT,THROTTLE_PUBLIC_LIMIT,THROTTLE_STRICT_LIMIT
          script: |
            # Docker and database credentials
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export DB_NAME="${{ secrets.DB_NAME }}"
            export MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export JWT_EXPIRES_IN="${{ secrets.JWT_EXPIRES_IN }}"
            export CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}"
            export API_KEY_SECRET="${{ secrets.API_KEY_SECRET }}"
            export REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
            # Internal Docker network hosts (not secrets)
            export DB_HOST="mysql"
            export REDIS_HOST="redis"
            # Configuration variables (use GitHub vars or defaults)
            export REDIS_TTL="${{ vars.REDIS_TTL || 300 }}"
            export THROTTLE_TTL="${{ vars.THROTTLE_TTL || 60 }}"
            export THROTTLE_LIMIT="${{ vars.THROTTLE_LIMIT || 10 }}"
            export THROTTLE_PUBLIC_LIMIT="${{ vars.THROTTLE_PUBLIC_LIMIT || 20 }}"
            export THROTTLE_STRICT_LIMIT="${{ vars.THROTTLE_STRICT_LIMIT || 5 }}"

            cd /home/cativo23/deploy/portfolio-api-deploy

            # Create .env file for docker compose
            echo "DB_HOST=mysql" > .env
            echo "DB_PORT=3306" >> .env
            echo "DB_USERNAME=${DB_USERNAME}" >> .env
            echo "DB_PASSWORD=${DB_PASSWORD}" >> .env
            echo "DB_NAME=${DB_NAME}" >> .env
            echo "MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}" >> .env
            echo "JWT_SECRET=${JWT_SECRET}" >> .env
            echo "JWT_EXPIRES_IN=${JWT_EXPIRES_IN}" >> .env
            echo "CORS_ORIGINS=${CORS_ORIGINS}" >> .env
            echo "API_KEY_SECRET=${API_KEY_SECRET}" >> .env
            echo "REDIS_HOST=redis" >> .env
            echo "REDIS_PORT=6379" >> .env
            echo "REDIS_PASSWORD=${REDIS_PASSWORD}" >> .env
            echo "REDIS_TTL=${REDIS_TTL}" >> .env
            echo "THROTTLE_TTL=${THROTTLE_TTL}" >> .env
            echo "THROTTLE_LIMIT=${THROTTLE_LIMIT}" >> .env
            echo "THROTTLE_PUBLIC_LIMIT=${THROTTLE_PUBLIC_LIMIT}" >> .env
            echo "THROTTLE_STRICT_LIMIT=${THROTTLE_STRICT_LIMIT}" >> .env

            # Verify .env file was created
            echo "=== .env file contents ==="
            cat .env
            echo "=========================="

            # Login to Docker Hub on server
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Pull latest image
            docker compose -f compose.prod.yml pull
            
            # Stop and remove old containers (but keep volumes)
            docker compose -f compose.prod.yml down || true

            # Start new containers (explicitly load .env file)
            docker compose --env-file .env -f compose.prod.yml up -d
            
            # Wait for services to be healthy
            sleep 10
            
            # Run database migrations (if needed)
            # docker compose -f compose.prod.yml exec -T api yarn migration:run || true
            
            # Clean up old images
            docker image prune -f
            
            # Show logs
            echo "=== Deployment Logs ==="
            docker compose -f compose.prod.yml logs --tail=50